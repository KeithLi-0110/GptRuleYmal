rules:
  # Microsoft / Azure / SharePoint / Azure DevOps → Direct
  - DOMAIN-SUFFIX,microsoft.com,DIRECT
  - DOMAIN-SUFFIX,microsoftonline.com,DIRECT
  - DOMAIN-SUFFIX,live.com,DIRECT
  - DOMAIN-SUFFIX,office.com,DIRECT
  - DOMAIN-SUFFIX,office.net,DIRECT
  - DOMAIN-SUFFIX,sharepoint.com,DIRECT
  - DOMAIN-SUFFIX,outlook.com,DIRECT
  - DOMAIN-SUFFIX,azure.com,DIRECT
  - DOMAIN-SUFFIX,azure.net,DIRECT
  - DOMAIN-SUFFIX,azureedge.net,DIRECT
  - DOMAIN-SUFFIX,visualstudio.com,DIRECT
  - DOMAIN-SUFFIX,dev.azure.com,DIRECT
  - DOMAIN-SUFFIX,azure-devops.com,DIRECT
  - DOMAIN-KEYWORD,microsoft,DIRECT
  - DOMAIN-KEYWORD,azure,DIRECT
  - DOMAIN-KEYWORD,sharepoint,DIRECT

  # ChatGPT / OpenAI domains → VPN
  - DOMAIN-SUFFIX,openai.com,PROXY
  - DOMAIN-SUFFIX,chatgpt.com,PROXY
  - DOMAIN-SUFFIX,ai.com,PROXY
  - DOMAIN-KEYWORD,openai,PROXY

  # Optional but recommended: API + CDN endpoints
  - DOMAIN-SUFFIX,oaiusercontent.com,PROXY
  - DOMAIN-SUFFIX,oaistatic.com,PROXY

  # Everything else → Direct
  - MATCH,DIRECT
